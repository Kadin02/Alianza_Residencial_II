<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estado de Cuenta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#eef1f5;
  color:#1f2937;
  font-size:13px;
}

/* HEADER SUPERIOR */
.print-bar{
  background:#1e293b;
  padding:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.print-bar button{
  padding:6px 16px;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}

.btn-print{background:#fff;color:#1e293b;}
.btn-back{background:transparent;color:#fff;border:1px solid #fff;}

/* CONTENEDOR */
.page{
  width:210mm;
  margin:20px auto;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  padding-bottom:20px;
}

/* HEADER */
.doc-head{
  background:#2c3e50;
  color:#fff;
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand-logo{
  width:50px;height:50px;
  background:#fff;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.brand-logo img{
  width:100%;height:100%;object-fit:contain;
}

.brand-name h1{
  font-size:1rem;
  font-weight:800;
}

.brand-name p{
  font-size:.7rem;
  opacity:.7;
}

.doc-title{
  text-align:right;
}

.doc-title h2{
  font-size:1rem;
  text-transform:uppercase;
}

.doc-title span{
  font-size:.7rem;
  opacity:.7;
}

/* RESUMEN */
.fin-summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:16px;
}

.fin-cell{
  background:#f4f6f9;
  border-radius:8px;
  padding:12px;
}

.fc-lbl{
  font-size:.65rem;
  color:#6b7280;
  text-transform:uppercase;
}

.fc-val{
  font-size:1.3rem;
  font-weight:800;
}

.paid{color:#16a34a;}
.pending{color:#dc2626;}

/* DATOS */
.owner-section{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:0 16px 16px;
}

.owner-cell .lbl{
  font-size:.6rem;
  color:#6b7280;
}

.owner-cell .val{
  font-weight:600;
}

/* TABLA */
.table-wrap{
  padding:0 16px;
}

table{
  width:100%;
  border-collapse:collapse;
  border:1px solid #e5e7eb;
  border-radius:8px;
  overflow:hidden;
}

thead{
  background:#f1f3f5;
}

thead th{
  padding:8px;
  font-size:.65rem;
  color:#374151;
  text-transform:uppercase;
}

tbody td{
  padding:8px;
}

tbody tr{
  border-bottom:1px solid #f0f0f0;
}

tbody tr:hover{
  background:#f9fafb;
}

.r{text-align:right;}
.b{font-weight:700;}
.muted{color:#6b7280;}

/* DETALLE PAGOS */
.pay-detail-row td{
  padding:0 10px 8px 30px;
}

.pay-detail-inner{
  background:#f9fafb;
  border-left:3px solid #cbd5e1;
  padding:6px 10px;
  font-size:.75rem;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* FOOTER */
.doc-footer{
  margin-top:20px;
  border-top:2px solid #2c3e50;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  font-size:.7rem;
  color:#6b7280;
}

.firma-line{
  border-top:1px solid #aaa;
  margin-top:30px;
  padding-top:4px;
  text-align:center;
}

/* LOADING */
#loading{
  text-align:center;
  padding:60px;
  color:#999;
}

</style>
</head>

<body>

<div class="print-bar">
  <button class="btn-print" onclick="window.print()">Imprimir</button>
  <button class="btn-back" onclick="window.close()">Cerrar</button>
</div>

<div id="loading">Cargando estado de cuenta...</div>

<div class="page" id="stmt-page" style="display:none;">

<!-- HEADER -->
<div class="doc-head">
  <div class="brand">
    <div class="brand-logo" id="stmt-logo">AR</div>
    <div class="brand-name">
      <h1>ALIANZA RESIDENCIAL</h1>
      <p id="stmt-prop-addr"></p>
    </div>
  </div>

  <div class="doc-title">
    <h2>Estado de Cuenta</h2>
    <span id="stmt-date"></span>
  </div>
</div>

<!-- RESUMEN -->
<div class="fin-summary">
  <div class="fin-cell">
    <div class="fc-lbl">Total facturado</div>
    <div class="fc-val" id="sum-total"></div>
  </div>
  <div class="fin-cell">
    <div class="fc-lbl">Pagado</div>
    <div class="fc-val paid" id="sum-paid"></div>
  </div>
  <div class="fin-cell">
    <div class="fc-lbl">Pendiente</div>
    <div class="fc-val pending" id="sum-pend"></div>
  </div>
</div>

<!-- CLIENTE -->
<div class="owner-section">
  <div class="owner-cell">
    <div class="lbl">Propietario</div>
    <div class="val" id="s-owner"></div>
  </div>
  <div class="owner-cell">
    <div class="lbl">Unidad</div>
    <div class="val" id="s-unit"></div>
  </div>
  <div class="owner-cell">
    <div class="lbl">Propiedad</div>
    <div class="val" id="s-prop"></div>
  </div>
</div>

<!-- TABLA -->
<div class="table-wrap">
<table>
<thead>
<tr>
  <th>Descripción</th>
  <th>Fecha de pago</th>
  <th class="r">Cargo</th>
  <th class="r">Pagado</th>
  <th class="r">Saldo</th>
</tr>
</thead>
<tbody id="stmt-tbody"></tbody>
</table>
</div>

<!-- FOOTER -->
<div class="doc-footer">
  <div>
    Documento generado automáticamente<br>
    Sistema de Administración de Propiedades
  </div>
  <div class="firma-line">Firma Administración</div>
</div>

</div>

<script>
const fmoney = v => parseFloat(v||0).toLocaleString('es-PA',{minimumFractionDigits:2});
const fdate = s => s ? new Date(s).toLocaleDateString('es-PA') : '—';

(async () => {

const params = new URLSearchParams(location.search);
const ownerId = params.get('owner_id');

const data = await fetch(`/api/finance/owner-statement-detailed/${ownerId}`).then(r=>r.json());

document.getElementById('stmt-date').textContent = new Date().toLocaleDateString('es-PA');

document.getElementById('s-owner').textContent = data.owner_name;
document.getElementById('s-unit').textContent = data.unit_number;
document.getElementById('s-prop').textContent = data.property_name;
document.getElementById('stmt-prop-addr').textContent = data.property_address;

let t=0,p=0,b=0;

data.statement.forEach(c=>{
  t+=c.amount;
  p+=c.paid;
  b+=c.balance;

  const fechaPago = c.payments?.length ? fdate(c.payments[0].payment_date) : '—';

  document.getElementById('stmt-tbody').innerHTML+=`
    <tr>
      <td class="b">${c.description}</td>
      <td class="muted">${fechaPago}</td>
      <td class="r">$${fmoney(c.amount)}</td>
      <td class="r">$${fmoney(c.paid)}</td>
      <td class="r b">$${fmoney(c.balance)}</td>
    </tr>
  `;
});

document.getElementById('sum-total').textContent="$"+fmoney(t);
document.getElementById('sum-paid').textContent="$"+fmoney(p);
document.getElementById('sum-pend').textContent="$"+fmoney(b);

document.getElementById('loading').style.display='none';
document.getElementById('stmt-page').style.display='block';

})();
</script>

</body>
</html>
