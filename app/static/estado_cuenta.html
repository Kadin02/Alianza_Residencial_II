<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Cuenta | Alianza Residencial</title>
  <link rel="stylesheet" href="css/doc_style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="document-wrapper">
    <div class="action-bar">
      <span><i class="fas fa-file-invoice-dollar"></i> Estado de Cuenta</span>
      <button class="btn-action btn-print" onclick="window.print()">
        <i class="fas fa-print"></i> Imprimir
      </button>
      <button class="btn-action" onclick="window.open(location.href)" style="font-size:.75rem;">
        <i class="fas fa-sync-alt"></i> Refrescar
      </button>
      <button class="btn-action btn-close" onclick="window.close()">
        <i class="fas fa-times"></i> Cerrar
      </button>
    </div>
    <div class="document" id="doc">
      <div style="text-align:center;padding:3rem;color:var(--doc-muted);">
        <i class="fas fa-spinner fa-spin"></i> Cargando estado de cuenta...
      </div>
    </div>
  </div>

<script>
const fmoney = v => parseFloat(v||0).toLocaleString('es-PA',{minimumFractionDigits:2});
const fdate = s => s ? new Date(s + 'T00:00:00').toLocaleDateString('es-PA', {
  year: 'numeric', month: 'long', day: 'numeric'
}) : '—';
const fdateshort = s => s ? new Date(s + 'T00:00:00').toLocaleDateString('es-PA') : '—';

(async()=>{
  const params = new URLSearchParams(location.search);
  const ownerId = params.get('owner_id');

  if (!ownerId) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-muted);">Propietario no especificado.</div>`;
    return;
  }

  try {
    // Obtener datos del estado de cuenta detallado
    const data = await fetch(`/api/finance/owner-statement-detailed/${ownerId}`).then(r=>r.json());

    let totalFacturado = 0, totalPagado = 0, saldoActual = 0;
    let tbody = '';

    if (data.statement && data.statement.length > 0) {
      data.statement.forEach(item => {
        totalFacturado += item.amount || 0;
        totalPagado += item.paid || 0;
        saldoActual += item.balance || 0;
        const isPending = item.balance > 0;
        
        // Construir los números de factura desde los pagos vinculados
        let facturasHTML = '—';
        if (item.payments && item.payments.length > 0) {
          facturasHTML = item.payments.map(p => {
            // Primero intentar con fiscal_invoice_number, luego invoice_number del pago
            const num = p.fiscal_invoice_number || p.reference || '';
            if (num) {
              return `<span style="font-family:monospace;font-weight:600;">${num}</span>`;
            }
            return '';
          }).filter(f => f !== '').join(', ') || '—';
        }
        // Si no hay facturas en payments, intentar obtener el último payment_id
        if (facturasHTML === '—' && item.payment_id) {
          facturasHTML = `<span style="font-family:monospace;font-weight:600;">Pago #${item.payment_id}</span>`;
        }
        
        tbody += `
          <tr class="${isPending ? 'bg-danger-light' : ''}">
            <td>${item.description || '—'}</td>
            <td style="font-size:.82rem;">${facturasHTML}</td>
            <td class="right">$${fmoney(item.amount)}</td>
            <td class="right" style="color:#10b981;">$${fmoney(item.paid)}</td>
            <td class="right ${isPending ? 'text-danger' : ''}">
              $${fmoney(item.balance)}
              ${isPending ? '<br><span class="badge-pendiente">PENDIENTE</span>' : '<span class="badge-pagado">PAGADO</span>'}
            </td>
          </tr>`;
      });
    } else {
      tbody = `<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--doc-muted);">Sin movimientos registrados</td></tr>`;
    }

    document.getElementById('doc').innerHTML = `
      <div class="doc-header">
        <div>
          <h1>MERCEDES BIENES RAÍCES</h1>
          <div class="sub-info">AR | Sistema de Administración de Propiedades</div>
        </div>
        <div class="doc-title">
          <h2>Estado de Cuenta</h2>
          <div class="date" id="doc-date"></div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-cell">
          <div class="ic-lbl">Propietario</div>
          <div class="ic-val">${data.owner_name || '—'}</div>
        </div>
        <div class="info-cell">
          <div class="ic-lbl">Unidad</div>
          <div class="ic-val">Apt. ${data.unit_number || '—'}</div>
        </div>
        <div class="info-cell">
          <div class="ic-lbl">Propiedad / Edificio</div>
          <div class="ic-val">${data.property_name || 'Alianza Residencial'}</div>
        </div>
      </div>

      <div class="summary-cards">
        <div class="sum-card">
          <div class="sv">$${fmoney(totalFacturado)}</div>
          <div class="sl">Facturado</div>
        </div>
        <div class="sum-card success">
          <div class="sv">$${fmoney(totalPagado)}</div>
          <div class="sl">Pagado</div>
        </div>
        <div class="sum-card danger">
          <div class="sv">$${fmoney(saldoActual)}</div>
          <div class="sl">Pendiente</div>
          ${saldoActual > 0 ? '<span class="badge-pendiente">CON DEUDA</span>' : '<span class="badge-pagado">AL DÍA</span>'}
        </div>
      </div>

      <table class="doc-table">
        <thead>
          <tr>
            <th>Concepto</th>
            <th># Factura</th>
            <th class="right">Cargo</th>
            <th class="right">Abono</th>
            <th class="right">Saldo</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>

      <div class="signature-section">
        <div class="signature-block">
          <div class="signature-line"></div>
          <div class="sig-name">Mercedes Bienes Raíces</div>
          <div class="sig-title">Administración</div>
        </div>
      </div>

      <div class="doc-footer-note">
        <strong><i class="fas fa-info-circle"></i> Nota informativa</strong>
        Este estado de cuenta refleja los movimientos registrados en el sistema de administración Alianza Residencial. Para cualquier aclaración o detalle adicional, favor contactar a la administración.
      </div>
    `;
    document.getElementById('doc-date').textContent = new Date().toLocaleDateString('es-PA', { year:'numeric', month:'long', day:'numeric' });
  } catch (error) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-danger);">Error al cargar el estado de cuenta.</div>`;
  }
})();
</script>
</body>
</html>
