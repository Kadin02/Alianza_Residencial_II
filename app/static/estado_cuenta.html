<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Cuenta | Alianza Residencial</title>
  <link rel="stylesheet" href="css/doc_style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="document-wrapper">
    <div class="action-bar" id="actionBar">
      <span><i class="fas fa-file-invoice-dollar"></i> Estado de Cuenta</span>
      <button class="btn-action btn-download" onclick="descargarPDF()">
        <i class="fas fa-download"></i> Descargar PDF
      </button>
      <button class="btn-action btn-print" onclick="window.print()">
        <i class="fas fa-print"></i> Imprimir
      </button>
      <button class="btn-action" onclick="window.open(location.href)" style="font-size:.75rem;">
        <i class="fas fa-sync-alt"></i> Refrescar
      </button>
      <button class="btn-action btn-close" onclick="window.close()">
        <i class="fas fa-times"></i> Cerrar
      </button>
    </div>
    <div class="action-bar" id="controls-bar" style="display:none;">
      <div id="unit-selector-wrap" style="display:none;align-items:center;gap:8px;">
        <span>Unidad:</span>
        <select id="unit-selector" style="padding:5px 10px;border-radius:6px;border:none;font-family:inherit;font-size:.8rem;"></select>
      </div>
    </div>
    <div class="document" id="doc">
      <div style="text-align:center;padding:3rem;color:var(--doc-muted);">
        <i class="fas fa-spinner fa-spin"></i> Cargando estado de cuenta...
      </div>
    </div>
  </div>

<script>
const fmoney = v => parseFloat(v||0).toLocaleString('es-PA',{minimumFractionDigits:2});
const fdate = s => s ? new Date(s + 'T00:00:00').toLocaleDateString('es-PA', {
  year: 'numeric', month: 'long', day: 'numeric'
}) : '—';
const fdateshort = s => s ? new Date(s + 'T00:00:00').toLocaleDateString('es-PA') : '—';

let currentUnitId = null;

async function loadStatement(unitId) {
  try {
    const d = await fetch(`/api/finance/unit-statement/${unitId}?include_history=true`).then(r=>r.json());

    const ledger = d.ledger || [];

    let tbody = '';
    if (ledger.length > 0) {
      ledger.forEach(row => {
        const esInicial = row.tipo === 'INICIAL';
        tbody += `
          <tr${esInicial ? ' style="background:var(--surface);font-style:italic;"' : ''}>
            <td style="white-space:nowrap;">${fdateshort(row.fecha)}</td>
            <td style="font-size:.8rem;font-family:monospace;color:var(--doc-muted);">${row.documento}</td>
            <td>${row.concepto}</td>
            <td class="right">${row.cargo > 0 ? '$' + fmoney(row.cargo) : '—'}</td>
            <td class="right" style="color:#10b981;">${row.pago > 0 ? '$' + fmoney(row.pago) : '—'}</td>
            <td class="right"><strong>$${fmoney(row.saldo)}</strong></td>
          </tr>`;
      });
    } else {
      tbody = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--doc-muted);">Sin movimientos registrados</td></tr>`;
    }

    const recargosCard = d.total_recargos > 0 ? `
        <div class="sum-card danger">
          <div class="sv">$${fmoney(d.total_recargos)}</div>
          <div class="sl">Recargos</div>
        </div>` : '';

    const contactItems = [
      d.property_phone   ? `<span><i class="fas fa-phone"></i> ${d.property_phone}</span>`     : '',
      d.property_email   ? `<span><i class="fas fa-envelope"></i> ${d.property_email}</span>`   : '',
      d.property_website ? `<span><i class="fas fa-globe"></i> ${d.property_website}</span>`    : '',
    ].filter(Boolean).join('');

    document.getElementById('doc').innerHTML = `
      <div class="doc-header">
        <div>
          <h1>${(d.property_name || 'Alianza Residencial').toUpperCase()}</h1>
          <div class="sub-info">Sistema de Administración de Propiedades</div>
        </div>
        <div class="doc-title">
          <h2>Estado de Cuenta</h2>
          <div class="date" id="doc-date"></div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-cell">
          <div class="ic-lbl">Edificio / Propiedad</div>
          <div class="ic-val">${d.property_name || 'Alianza Residencial'}</div>
        </div>
        <div class="info-cell">
          <div class="ic-lbl">Apartamento</div>
          <div class="ic-val">Apt. ${d.unit_number || '—'}</div>
        </div>
        <div class="info-cell">
          <div class="ic-lbl">Propietario</div>
          <div class="ic-val">${d.owner_name || '—'}</div>
        </div>
      </div>

      <div class="summary-cards">
        <div class="sum-card">
          <div class="sv">$${fmoney(d.total_cargos)}</div>
          <div class="sl">Total de Cargos</div>
        </div>
        <div class="sum-card success">
          <div class="sv">$${fmoney(d.total_pagos)}</div>
          <div class="sl">Total de Pagos</div>
        </div>
        <div class="sum-card balance-highlight">
          <div class="sv">$${fmoney(d.saldo_actual)}</div>
          <div class="sl">Balance</div>
        </div>
        ${recargosCard}
      </div>

      <table class="doc-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>N° Documento</th>
            <th>Concepto</th>
            <th class="right">Cargos</th>
            <th class="right">Pagos</th>
            <th class="right">Saldo</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>

      <div class="doc-footer-grid">
        <div class="footer-balance-box">
          <div class="fb-label">Balance Actual</div>
          <div class="fb-value">$${fmoney(d.saldo_actual)}</div>
          <div class="fb-date">Fecha de corte: ${new Date().toLocaleDateString('es-PA', { year:'numeric', month:'long', day:'numeric' })}</div>
        </div>
        <div class="doc-footer-note" style="margin-top:0;">
          <strong><i class="fas fa-info-circle"></i> Nota informativa</strong>
          Este estado de cuenta refleja los movimientos registrados en el sistema de administración. Para cualquier aclaración o detalle adicional, favor contactar a la administración.
        </div>
      </div>

      ${contactItems ? `<div class="contact-bar">${contactItems}</div>` : ''}

      <div class="signature-section">
        <div class="signature-block">
          <div class="signature-line"></div>
          <div class="sig-name">${d.property_name || 'Alianza Residencial'}</div>
          <div class="sig-title">Administración</div>
        </div>
      </div>
    `;
    document.getElementById('doc-date').textContent = new Date().toLocaleDateString('es-PA', { year:'numeric', month:'long', day:'numeric' });
  } catch (error) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-danger);">Error al cargar el estado de cuenta.</div>`;
  }
}

(async()=>{
  const params  = new URLSearchParams(location.search);
  const ownerId = params.get('owner_id');
  let   unitId  = params.get('unit_id') ? parseInt(params.get('unit_id')) : null;

  if (!ownerId && !unitId) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-muted);">Propietario o unidad no especificados.</div>`;
    return;
  }

  // Compatibilidad con links viejos por owner_id: resolver sus unidades
  // (activas e históricas) vía /unit-owners/all, ya que no existe un
  // endpoint dedicado "por propietario" para esto.
  if (!unitId && ownerId) {
    const allRelations = await fetch('/api/unit-owners/all').then(r=>r.json()).catch(()=>[]);
    const unitIds = [...new Set(
      (allRelations || [])
        .filter(r => String(r.owner_id) === String(ownerId))
        .map(r => r.unit_id)
    )];

    if (!unitIds.length) {
      document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-muted);">Este propietario no tiene unidades registradas.</div>`;
      return;
    }

    if (unitIds.length === 1) {
      unitId = unitIds[0];
    } else {
      const allUnits = await fetch('/api/units').then(r=>r.json()).catch(()=>[]);
      document.getElementById('controls-bar').style.display = 'flex';
      const wrap   = document.getElementById('unit-selector-wrap');
      const select = document.getElementById('unit-selector');
      wrap.style.display = 'flex';
      select.innerHTML = unitIds.map(uid => {
        const u = (allUnits || []).find(x => x.id === uid);
        return `<option value="${uid}">Apt. ${u ? u.unit_number : uid}</option>`;
      }).join('');
      unitId = unitIds[0];
      select.addEventListener('change', () => {
        currentUnitId = parseInt(select.value);
        loadStatement(currentUnitId);
      });
    }
  }

  currentUnitId = unitId;
  await loadStatement(currentUnitId);
})();

function descargarPDF() {
  const bar = document.getElementById('actionBar');
  bar.style.display = 'none';
  const opt = {
    margin:       [8, 8, 8, 8],
    filename:     `estado_cuenta_alianza.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] },
  };
  html2pdf().set(opt).from(document.getElementById('doc')).save().then(() => {
    bar.style.display = '';
  });
}
</script>
</body>
</html>
