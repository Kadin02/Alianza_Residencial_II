<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factura | Alianza Residencial</title>
  <link rel="stylesheet" href="css/doc_style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .numero-fiscal {
      font-size: .9rem; font-weight: 700; color: var(--doc-accent);
      background: var(--doc-bg); padding: 4px 12px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="document-wrapper">
    <div class="action-bar" id="actionBar">
      <span><i class="fas fa-receipt"></i> Factura de Pago</span>
      <button class="btn-action btn-download" onclick="descargarPDF()">
        <i class="fas fa-download"></i> Descargar PDF
      </button>
      <button class="btn-action btn-print" onclick="window.print()">
        <i class="fas fa-print"></i> Imprimir
      </button>
      <button class="btn-action btn-close" onclick="window.close()">
        <i class="fas fa-times"></i> Cerrar
      </button>
    </div>
    <div class="document" id="doc">
      <div style="text-align:center;padding:3rem;color:var(--doc-muted);">
        <i class="fas fa-spinner fa-spin"></i> Cargando factura...
      </div>
    </div>
  </div>

<script>
const TOKEN_KEY = 'alianza_token';
function token() { return localStorage.getItem(TOKEN_KEY); }

async function apiGet(endpoint) {
  const res = await fetch(`/api${endpoint}`, {
    headers: { 'Authorization': `Bearer ${token()}`, 'Content-Type': 'application/json' }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function fmoney(v) {
  return parseFloat(v || 0).toLocaleString('es-PA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function render(d) {
  if (!d || !d.payment_id) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-muted);">Factura no encontrada.</div>`;
    return;
  }
  const totalPendiente = parseFloat(d.total_amount || 0); // Simplificado para factura
  const estado = totalPendiente <= 0 ? 'PAGADO' : 'PENDIENTE';
  
  const cargosRows = (d.applications || []).map(c => `
    <tr>
      <td>${c.description || 'Cargo'}</td>
      <td class="right">$${fmoney(c.applied_amount || 0)}</td>
    </tr>
  `).join('');

  document.getElementById('doc').innerHTML = `
    <div class="doc-header">
      <div>
        <h1>ALIANZA RESIDENCIAL</h1>
        <div class="sub-info">Sistema de Administración de Propiedades</div>
      </div>
      <div class="doc-title">
        <h2>Factura de Pago</h2>
        <div class="date" id="doc-date"></div>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-cell">
        <div class="ic-lbl">Propietario</div>
        <div class="ic-val">${d.owner_name || '—'}</div>
      </div>
      <div class="info-cell">
        <div class="ic-lbl">Unidad</div>
        <div class="ic-val">Apt. ${d.unit_number || '—'}</div>
      </div>
      <div class="info-cell">
        <div class="ic-lbl">Propiedad / Edificio</div>
        <div class="ic-val">${d.property_name || 'Alianza Residencial'}</div>
      </div>
    </div>

    <table style="width:100%; margin-bottom: 24px;">
      <tr>
        <td style="font-weight: 700;">N° Factura Fiscal:</td>
        <td><span class="numero-fiscal">${d.fiscal_invoice_number || '—'}</span></td>
        <td style="font-weight: 700;">Referencia / Recibo:</td>
        <td>${d.receipt_number || '—'}</td>
      </tr>
    </table>

    <div class="summary-cards">
      <div class="sum-card">
        <div class="sv">$${fmoney(d.amount)}</div>
        <div class="sl">Monto Total</div>
      </div>
      <div class="sum-card danger">
        <div class="sv">$${fmoney(totalPendiente)}</div>
        <div class="sl">Pendiente</div>
        <span class="badge-pendiente">${estado}</span>
      </div>
    </div>

    <table class="doc-table">
      <thead>
        <tr><th>Concepto / Cargo Aplicado</th><th class="right">Monto</th></tr>
      </thead>
      <tbody>
        ${cargosRows || `<tr><td colspan="2" style="text-align:center;">Sin detalle de cargos</td></tr>`}
        <tr style="background:var(--doc-bg);">
          <td style="text-align:right;"><strong>TOTAL PAGADO</strong></td>
          <td class="right"><strong>$${fmoney(d.amount)}</strong></td>
        </tr>
      </tbody>
    </table>

    <div class="signature-section">
      <div class="signature-block">
        <div class="signature-line"></div>
        <div class="sig-name">Mercedes Bienes Raíces</div>
        <div class="sig-title">Administración</div>
      </div>
    </div>

    <div class="doc-footer-note">
      <strong><i class="fas fa-info-circle"></i> Nota</strong>
      Documento generado electrónicamente por el Sistema de Administración de Propiedades Alianza Residencial. Consérvelo como comprobante de pago.
    </div>
  `;
  document.getElementById('doc-date').textContent = new Date().toLocaleDateString('es-PA', { year:'numeric', month:'long', day:'numeric' });
}

(async()=>{
  const params = new URLSearchParams(window.location.search);
  const paymentId = params.get('payment_id');
  if (!paymentId) { document.getElementById('doc').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--doc-muted);">Pago no especificado.</div>'; return; }
  try {
    const detail = await apiGet(`/finance/payment-detail-full/${paymentId}`);
    render(detail);
  } catch (e) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-danger);">Error al cargar: ${e.message}</div>`;
  }
})();

function descargarPDF() {
  const bar = document.getElementById('actionBar');
  bar.style.display = 'none';
  const opt = {
    margin:       [8, 8, 8, 8],
    filename:     `factura_alianza.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] },
  };
  html2pdf().set(opt).from(document.getElementById('doc')).save().then(() => {
    bar.style.display = '';
  });
}
</script>
</body>
</html>
