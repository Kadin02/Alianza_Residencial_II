<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factura | Alianza Residencial</title>
  <link rel="stylesheet" href="css/doc_style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .numero-fiscal {
      font-size: .9rem; font-weight: 700; color: var(--doc-accent);
      background: var(--doc-bg); padding: 4px 12px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="document-wrapper">
    <div class="action-bar" id="actionBar">
      <span><i class="fas fa-receipt"></i> Factura de Pago</span>
      <button class="btn-action btn-download" onclick="descargarPDF()">
        <i class="fas fa-download"></i> Descargar PDF
      </button>
      <button class="btn-action btn-print" onclick="window.print()">
        <i class="fas fa-print"></i> Imprimir
      </button>
      <button class="btn-action btn-close" onclick="window.close()">
        <i class="fas fa-times"></i> Cerrar
      </button>
    </div>
    <div class="document" id="doc">
      <div style="text-align:center;padding:3rem;color:var(--doc-muted);">
        <i class="fas fa-spinner fa-spin"></i> Cargando factura...
      </div>
    </div>
  </div>

<script>
const TOKEN_KEY = 'alianza_token';
function token() { return localStorage.getItem(TOKEN_KEY); }

async function apiGet(endpoint) {
  const res = await fetch(`/api${endpoint}`, {
    headers: { 'Authorization': `Bearer ${token()}`, 'Content-Type': 'application/json' }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function fmoney(v) {
  return parseFloat(v || 0).toLocaleString('es-PA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

const fdate = s => {
  if (!s) return '—';
  try {
    const [y, m, dd] = String(s).split('T')[0].split('-');
    return `${dd}/${m}/${y}`;
  } catch { return s; }
};

function render(d) {
  if (!d || !d.payment_id) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-muted);">Factura no encontrada.</div>`;
    return;
  }

  // N° de recibo: preferimos el fiscal (facturero físico), si no el del
  // sistema, si no la referencia del pago.
  const numeroRecibo = d.fiscal_invoice_number || d.invoice_number || d.reference || `Pago #${d.payment_id}`;

  const apps = d.applications || [];

  // Ledger estilo banco: una fila por cargo pagado en este recibo, ya
  // ordenadas por date_created del cargo (nunca due_date, que no se muestra).
  const ledgerRows = apps.map(a => `
    <tr${a.is_recargo ? ' style="background:var(--doc-danger-bg);"' : ''}>
      <td>${fdate(d.payment_date)}</td>
      <td style="font-family:monospace;font-size:.82rem;color:var(--doc-muted);">${numeroRecibo}</td>
      <td>${a.description || `Cargo #${a.charge_id}`}${a.is_recargo ? ' <span class="text-danger" style="font-size:.7rem;">(recargo)</span>' : ''}</td>
      <td class="right">${a.charge_amount != null ? '$' + fmoney(a.charge_amount) : '—'}</td>
      <td class="right">$${fmoney(a.applied_amount || 0)}</td>
      <td class="right">${a.charge_balance != null ? '$' + fmoney(a.charge_balance) : '—'}</td>
    </tr>
  `).join('');

  const recargoCard = d.recargo > 0 ? `
      <div class="sum-card danger">
        <div class="sv">$${fmoney(d.recargo)}</div>
        <div class="sl">Recargo</div>
      </div>` : '';

  const contactItems = [
    d.property_phone   ? `<span><i class="fas fa-phone"></i> ${d.property_phone}</span>`     : '',
    d.property_email   ? `<span><i class="fas fa-envelope"></i> ${d.property_email}</span>`   : '',
    d.property_website ? `<span><i class="fas fa-globe"></i> ${d.property_website}</span>`    : '',
  ].filter(Boolean).join('');

  document.getElementById('doc').innerHTML = `
    <div class="doc-header">
      <div>
        <h1>${(d.property_name || 'Alianza Residencial').toUpperCase()}</h1>
        <div class="sub-info">Sistema de Administración de Propiedades</div>
      </div>
      <div class="doc-title">
        <h2>Recibo de Pago</h2>
        <div class="date" id="doc-date"></div>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-cell">
        <div class="ic-lbl">Edificio / Propiedad</div>
        <div class="ic-val">${d.property_name || 'Alianza Residencial'}</div>
      </div>
      <div class="info-cell">
        <div class="ic-lbl">Apartamento</div>
        <div class="ic-val">Apt. ${d.unit_number || '—'}</div>
      </div>
      <div class="info-cell">
        <div class="ic-lbl">Propietario</div>
        <div class="ic-val">${d.owner_name || '—'}</div>
      </div>
    </div>

    <table style="width:100%; margin-bottom: 20px;">
      <tr>
        <td style="font-weight: 700;">N° de Recibo:</td>
        <td><span class="numero-fiscal">${numeroRecibo}</span></td>
        <td style="font-weight: 700;">Fecha de pago:</td>
        <td>${fdate(d.payment_date)}</td>
      </tr>
    </table>

    <table class="doc-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>N° Recibo</th>
          <th>Concepto</th>
          <th class="right">Cargo</th>
          <th class="right">Pago</th>
          <th class="right">Saldo</th>
        </tr>
      </thead>
      <tbody>
        ${ledgerRows || `<tr><td colspan="6" style="text-align:center;">Sin detalle de cargos</td></tr>`}
      </tbody>
    </table>

    <div class="summary-cards">
      <div class="sum-card">
        <div class="sv">$${fmoney(d.subtotal)}</div>
        <div class="sl">Subtotal</div>
      </div>
      ${recargoCard}
      <div class="sum-card balance-highlight">
        <div class="sv">$${fmoney(d.total)}</div>
        <div class="sl">Total</div>
      </div>
    </div>

    ${contactItems ? `<div class="contact-bar">${contactItems}</div>` : ''}

    <div class="signature-section">
      <div class="signature-block">
        <div class="signature-line"></div>
        <div class="sig-name">${d.property_name || 'Alianza Residencial'}</div>
        <div class="sig-title">Administración</div>
      </div>
    </div>

    <div class="doc-footer-note">
      <strong><i class="fas fa-info-circle"></i> Nota</strong>
      Documento generado electrónicamente por el Sistema de Administración de Propiedades. Consérvelo como comprobante de pago.
    </div>
  `;
  document.getElementById('doc-date').textContent = new Date().toLocaleDateString('es-PA', { year:'numeric', month:'long', day:'numeric' });
}

(async()=>{
  const params = new URLSearchParams(window.location.search);
  const paymentId = params.get('payment_id');
  if (!paymentId) { document.getElementById('doc').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--doc-muted);">Pago no especificado.</div>'; return; }
  try {
    const detail = await apiGet(`/finance/payment-detail-full/${paymentId}`);
    render(detail);
  } catch (e) {
    document.getElementById('doc').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--doc-danger);">Error al cargar: ${e.message}</div>`;
  }
})();

function descargarPDF() {
  const bar = document.getElementById('actionBar');
  bar.style.display = 'none';
  const opt = {
    margin:       [8, 8, 8, 8],
    filename:     `factura_alianza.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] },
  };
  html2pdf().set(opt).from(document.getElementById('doc')).save().then(() => {
    bar.style.display = '';
  });
}
</script>
</body>
</html>
