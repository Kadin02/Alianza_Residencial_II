<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Pagos | Alianza Residencial</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ── Filtros ── */
    .filter-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .filter-row > div { display:flex; flex-direction:column; }
    .filter-row label { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:4px; }
    .filter-row input, .filter-row select { width:auto; margin-bottom:0; min-width:140px; }

    .summary-chips { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .s-chip { padding:8px 16px; border-radius:var(--radius-md); border:1px solid var(--border); background:var(--card-bg); font-size:.78rem; }
    .s-chip strong { display:block; font-size:1rem; font-weight:800; color:var(--accent); }
    .s-chip span   { color:var(--text-muted); }

    .razon-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.7rem; font-weight:700; }
    .tag-mant  { background:#dbeafe; color:#1d4ed8; }
    .tag-gas   { background:#fef3c7; color:#b45309; }
    .tag-asc   { background:#d1fae5; color:#065f46; }
    .tag-admin { background:#ede9fe; color:#6d28d9; }
    .tag-otros { background:#f3f4f6; color:#374151; }

    /* ── Modal reporte ── */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(10,20,40,.5); z-index:500;
      align-items:flex-start; justify-content:center;
      backdrop-filter:blur(2px); padding:20px; overflow-y:auto;
    }
    .modal-overlay.open { display:flex; }
    .modal-box {
      background:var(--card-bg); border-radius:var(--radius-xl);
      width:820px; max-width:98vw; box-shadow:var(--shadow-lg);
      animation:modalIn .2s ease; margin:auto;
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(.97) translateY(10px); }
      to   { opacity:1; transform:scale(1)   translateY(0); }
    }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 24px 14px; border-bottom:1px solid var(--border);
    }
    .modal-header h3 { font-size:1rem; font-weight:700; color:var(--text-primary); }
    .modal-close { background:transparent; border:none; font-size:1.1rem; cursor:pointer; color:var(--text-muted); padding:4px 8px; border-radius:6px; transition:background .12s; width:auto; margin-top:0; }
    .modal-close:hover { background:var(--border); }
    .modal-body { padding:20px 24px; }
    .modal-selectors { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:18px; }
    .modal-selectors > div { display:flex; flex-direction:column; }
    .modal-selectors label.field-label { font-size:.7rem; }
    .modal-selectors select, .modal-selectors input { min-width:160px; margin-bottom:0; }

    /* ══ DOCUMENTO PDF — mismo estilo que estado_cuenta.html ══ */
    .pdf-doc {
      font-family: 'Lato', sans-serif;
      color: #222;
      font-size: 12.5px;
    }

    .pdf-doc .doc-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 18px; padding-bottom: 14px; border-bottom: 2px solid #1a1a2e;
    }
    .pdf-doc .brand { display: flex; align-items: center; gap: 10px; }
    .pdf-doc .brand-logo {
      width: 44px; height: 44px; background: #1a1a2e; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 900; font-size: .9rem; overflow: hidden;
    }
    .pdf-doc .brand-logo img { width:100%; height:100%; object-fit:contain; }
    .pdf-doc .brand-name h1  { font-size: .95rem; font-weight: 900; color: #1a1a2e; letter-spacing:.03em; }
    .pdf-doc .brand-name p   { font-size: .7rem; color: #888; margin-top:2px; line-height:1.5; }
    .pdf-doc .doc-title      { text-align: right; }
    .pdf-doc .doc-title h2   { font-size: 1.1rem; font-weight: 900; color: #1a1a2e; text-transform:uppercase; letter-spacing:.08em; }
    .pdf-doc .doc-title p    { font-size: .72rem; color: #888; margin-top: 3px; }

    .pdf-doc .info-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0; margin-bottom: 16px;
      border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden;
    }
    .pdf-doc .info-cell { padding: 10px 14px; border-right: 1px solid #e0e0e0; }
    .pdf-doc .info-cell:last-child { border-right: none; }
    .pdf-doc .info-cell .ic-lbl { font-size: .62rem; font-weight: 700; text-transform:uppercase; letter-spacing:.08em; color:#999; margin-bottom:3px; }
    .pdf-doc .info-cell .ic-val { font-size: .9rem; font-weight: 700; color: #1a1a2e; }

    .pdf-doc .section-title { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#999; margin-bottom:8px; }

    .pdf-doc .sum-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .pdf-doc .sum-chip {
      padding: 8px 14px; border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: .78rem;
    }
    .pdf-doc .sum-chip strong { display:block; font-size:.95rem; font-weight:900; color:#1a1a2e; }
    .pdf-doc .sum-chip span   { color:#888; }

    .pdf-doc table { width:100%; border-collapse:collapse; font-size:.82rem; margin-bottom:16px; }
    .pdf-doc thead tr { border-bottom: 2px solid #1a1a2e; }
    .pdf-doc thead th { padding:6px 10px; text-align:left; font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#1a1a2e; }
    .pdf-doc thead th.r { text-align:right; }
    .pdf-doc tbody tr { border-bottom: 1px solid #f0f0f0; }
    .pdf-doc tbody tr:last-child { border-bottom:none; }
    .pdf-doc tbody td { padding:7px 10px; color:#333; }
    .pdf-doc tbody td.r { text-align:right; font-weight:700; }
    .pdf-doc tbody td.muted { color:#999; font-size:.78rem; }

    .pdf-doc .total-line {
      border-top: 2px solid #1a1a2e; padding-top: 8px;
      display: flex; justify-content: flex-end; gap: 28px;
    }
    .pdf-doc .total-line .tl { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#999; }
    .pdf-doc .total-line .tv { font-size:1rem; font-weight:900; color:#1a1a2e; }

    .pdf-doc .legal-notice {
      margin-top: 14px; padding: 10px 14px;
      background: #f8f8f8; border: 1px solid #e8e8e8;
      border-left: 3px solid #1a1a2e; border-radius: 0 4px 4px 0;
    }
    .pdf-doc .legal-notice p { font-size:.62rem; color:#777; line-height:1.7; margin:0; }
    .pdf-doc .legal-notice strong { color:#555; }

    .pdf-doc .doc-footer {
      margin-top:16px; padding-top:12px; border-top:1px solid #e0e0e0;
      display:flex; justify-content:space-between; align-items:flex-end;
    }
    .pdf-doc .doc-footer-left { font-size:.65rem; color:#aaa; line-height:1.8; }
    .pdf-doc .firma-line { border-top:1px solid #bbb; margin-top:36px; padding-top:5px; font-size:.65rem; color:#aaa; text-align:center; min-width:140px; }

    /* ── Print del modal ── */
    @media print {
      /* Ocultar absolutamente todo */
      * { visibility: hidden; }

      /* Mostrar solo el documento del modal */
      #pdf-doc,
      #pdf-doc * { visibility: visible; }

      /* Posicionar el documento como si ocupara toda la página */
      #pdf-doc {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        padding: 12mm 14mm !important;
        background: #fff !important;
        box-shadow: none !important;
        font-size: 12.5px !important;
      }

      @page {
        size: A4;
        margin: 0;
      }
    }

  </style>
</head>
<body>
<div class="app">
  <div class="page-header">
    <h1><i class="fas fa-history" style="color:var(--accent);margin-right:8px;"></i>Historial de Pagos</h1>
    <p>Todos los pagos registrados en el sistema</p>
  </div>

  <!-- Filtros -->
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-sliders-h"></i> Filtros</h3>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="abrirReporte()" style="width:auto;margin-top:0;">
          <i class="fas fa-file-alt"></i> Reporte por Apartamento
        </button>
        <button class="btn btn-secondary" onclick="exportarExcel()" style="width:auto;margin-top:0;">
          <i class="fas fa-file-excel"></i> Excel
        </button>
        <button class="btn btn-ghost" onclick="limpiarFiltros()" style="width:auto;margin-top:0;">
          <i class="fas fa-times"></i> Limpiar
        </button>
      </div>
    </div>
    <div class="card-body">
      <div class="filter-row">
        <div>
          <label>Propietario</label>
          <select id="f-owner" onchange="aplicar()"><option value="">Todos</option></select>
        </div>
        <div>
          <label>Apartamento</label>
          <select id="f-apto" onchange="aplicar()"><option value="">Todos</option></select>
        </div>
        <div>
          <label>Concepto</label>
          <select id="f-concepto" onchange="aplicar()"><option value="">Todos</option></select>
        </div>
        <div>
          <label>Desde</label>
          <input type="date" id="f-desde" onchange="aplicar()">
        </div>
        <div>
          <label>Hasta</label>
          <input type="date" id="f-hasta" onchange="aplicar()">
        </div>
        <div>
          <label>Buscar</label>
          <input type="text" id="f-search" placeholder="Factura, monto..." oninput="aplicar()" style="min-width:180px;">
        </div>
      </div>
    </div>
  </div>

  <!-- Resumen chips -->
  <div class="summary-chips" id="summary-chips"></div>

  <!-- Tabla principal -->
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-table"></i> Registros</h3>
      <span class="badge badge-primary" id="total-count">0</span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th># Factura</th>
            <th>Fecha</th>
            <th>Apartamento</th>
            <th>Propietario</th>
            <th>Concepto</th>
            <th class="td-right">Monto</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="hist-tbody">
          <tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted);">
            <i class="fas fa-spinner fa-spin" style="font-size:1.5rem;display:block;margin-bottom:.5rem;opacity:.4;"></i>
            Cargando historial...
          </td></tr>
        </tbody>
      </table>
    </div>
    <div style="padding:10px 20px;font-size:.78rem;color:var(--text-muted);border-top:1px solid var(--border-light);" id="page-info"></div>
  </div>
</div>

<!-- ══ MODAL REPORTE ══ -->
<div class="modal-overlay" id="reporte-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fas fa-file-alt" style="color:var(--accent);margin-right:6px;"></i>Reporte por Apartamento</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary" onclick="imprimirPDF()" style="width:auto;margin-top:0;">
          <i class="fas fa-file-pdf"></i> Exportar PDF
        </button>
        <button class="btn btn-secondary" onclick="exportarReporteExcel()" style="width:auto;margin-top:0;">
          <i class="fas fa-file-excel"></i> Excel
        </button>
        <button class="modal-close" onclick="cerrarReporte()"><i class="fas fa-times"></i></button>
      </div>
    </div>
    <div class="modal-body">

      <!-- Selectores -->
      <div class="modal-selectors">
        <div>
          <label class="field-label">Apartamento *</label>
          <select id="rep-apto" onchange="generarReporte()">
            <option value="">Seleccione</option>
          </select>
        </div>
        <div>
          <label class="field-label">Desde</label>
          <input type="date" id="rep-desde" onchange="generarReporte()">
        </div>
        <div>
          <label class="field-label">Hasta</label>
          <input type="date" id="rep-hasta" onchange="generarReporte()">
        </div>
        <div>
          <label class="field-label">Concepto</label>
          <select id="rep-concepto" onchange="generarReporte()">
            <option value="">Todos</option>
          </select>
        </div>
      </div>

      <!-- Documento PDF renderizado aquí -->
      <div id="reporte-content">
        <div style="text-align:center;padding:3rem;color:var(--text-muted);">
          <i class="fas fa-home" style="font-size:2rem;opacity:.3;display:block;margin-bottom:.5rem;"></i>
          Selecciona un apartamento para generar el reporte
        </div>
      </div>
    </div>
  </div>
</div>

<div id="notification"></div>
<script src="js/main.js"></script>
<script>
renderSidebar('historial');

let allPagos  = [];
let filtrados = [];

/* ── Tag de concepto ─────────────────────────────────── */
function razonTag(t) {
  if (!t || t === '—') return `<span class="razon-tag tag-otros">—</span>`;
  const l = t.toLowerCase();
  let c = 'tag-otros';
  if (l.includes('mantenimiento'))                         c = 'tag-mant';
  else if (l.includes('gas'))                              c = 'tag-gas';
  else if (l.includes('ascensor') || l.includes('cuota')) c = 'tag-asc';
  else if (l.includes('admin'))                            c = 'tag-admin';
  return `<span class="razon-tag ${c}">${t}</span>`;
}

/* ── Init ─────────────────────────────────────────────── */
async function init() {
  const tbody = document.getElementById('hist-tbody');
  const pagos = await apiRequest('/finance/payments-history');

  if (!pagos) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--danger);">Error al cargar el historial.</td></tr>`;
    return;
  }
  if (!pagos.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted);">
      <i class="fas fa-inbox" style="font-size:2rem;opacity:.3;display:block;margin-bottom:.5rem;"></i>
      No hay pagos registrados.<br><small>Usa el importador de historial para cargar registros.</small>
    </td></tr>`;
    return;
  }

  allPagos = pagos.map(p => ({
    payment_id:  p.payment_id,
    factura:     p.factura     || '—',
    fecha:       p.fecha       || '',
    apto:        p.unit_number || '—',
    owner_name:  p.owner_name  || '—',
    concepto:    p.concepto    || '—',
    observacion: p.observacion || '',
    monto:       parseFloat(p.monto || 0),
  })).sort((a, b) => b.fecha.localeCompare(a.fecha));

  llenarFiltros();
  aplicar();
  llenarSelectoresReporte();
}

/* ── Selects ──────────────────────────────────────────── */
function llenarFiltros() {
  const owners    = [...new Set(allPagos.map(p => p.owner_name))].sort();
  const aptos     = [...new Set(allPagos.map(p => p.apto))].sort();
  const conceptos = [...new Set(allPagos.map(p => p.concepto))].sort();
  document.getElementById('f-owner').innerHTML   += owners.map(o    => `<option>${o}</option>`).join('');
  document.getElementById('f-apto').innerHTML    += aptos.map(a     => `<option>${a}</option>`).join('');
  document.getElementById('f-concepto').innerHTML+= conceptos.map(c => `<option>${c}</option>`).join('');
}

function llenarSelectoresReporte() {
  const aptos     = [...new Set(allPagos.map(p => p.apto))].sort();
  const conceptos = [...new Set(allPagos.map(p => p.concepto))].sort();
  document.getElementById('rep-apto').innerHTML    += aptos.map(a     => `<option>${a}</option>`).join('');
  document.getElementById('rep-concepto').innerHTML+= conceptos.map(c => `<option>${c}</option>`).join('');
}

/* ── Filtros tabla ───────────────────────────────────── */
function aplicar() {
  const owner    = document.getElementById('f-owner').value;
  const apto     = document.getElementById('f-apto').value;
  const concepto = document.getElementById('f-concepto').value;
  const desde    = document.getElementById('f-desde').value;
  const hasta    = document.getElementById('f-hasta').value;
  const search   = document.getElementById('f-search').value.toLowerCase().trim();

  filtrados = allPagos.filter(p => {
    if (owner    && p.owner_name !== owner)    return false;
    if (apto     && p.apto       !== apto)     return false;
    if (concepto && p.concepto   !== concepto) return false;
    if (desde    && p.fecha < desde)           return false;
    if (hasta    && p.fecha > hasta)           return false;
    if (search) {
      const txt = [p.factura, String(p.monto), p.concepto, p.owner_name, p.apto].join(' ').toLowerCase();
      if (!txt.includes(search)) return false;
    }
    return true;
  });
  renderTabla();
  renderResumen();
}

function limpiarFiltros() {
  ['f-owner','f-apto','f-concepto','f-desde','f-hasta','f-search'].forEach(id => document.getElementById(id).value = '');
  aplicar();
}

/* ── Tabla ───────────────────────────────────────────── */
function renderTabla() {
  document.getElementById('total-count').textContent = filtrados.length;
  const tbody = document.getElementById('hist-tbody');
  if (!filtrados.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted);">Sin resultados</td></tr>`;
    document.getElementById('page-info').textContent = '';
    return;
  }
  const visible = filtrados.slice(0, 500);
  tbody.innerHTML = visible.map(p => `
    <tr>
      <td class="td-mono" style="font-size:.78rem;color:var(--text-muted);">${p.factura}</td>
      <td style="white-space:nowrap;">${formatDate(p.fecha)}</td>
      <td><strong>Apt. ${p.apto}</strong></td>
      <td style="font-size:.83rem;">${p.owner_name}</td>
      <td>${razonTag(p.concepto)}</td>
      <td class="td-right"><strong>$${formatMoney(p.monto)}</strong></td>
      <td>
        ${p.payment_id ? `
          <button onclick="verFacturaDesdeHistorial(${p.payment_id})"
            style="background:var(--accent-soft);color:var(--accent);border:1px solid var(--border);
                   padding:4px 10px;font-size:.75rem;border-radius:5px;cursor:pointer;
                   font-family:inherit;font-weight:600;display:inline-flex;align-items:center;gap:4px;
                   margin:0;width:auto;">
            <i class="fas fa-receipt"></i> Ver Factura
          </button>
        ` : `<span style="color:var(--text-muted);">�</span>`}
      </td>
    </tr>`).join('');
  document.getElementById('page-info').textContent =
    filtrados.length > 500
      ? `Mostrando 500 de ${filtrados.length} — exporta Excel para ver todos`
      : `${filtrados.length} registro${filtrados.length !== 1 ? 's' : ''}`;
}

function verFacturaDesdeHistorial(paymentId) {
  window.open(`/static/factura.html?payment_id=${paymentId}`, '_blank');
}
/* ── Resumen chips ───────────────────────────────────── */
function renderResumen() {
  const chips = document.getElementById('summary-chips');
  if (!filtrados.length) { chips.innerHTML = ''; return; }
  const total = filtrados.reduce((s, p) => s + p.monto, 0);
  const porC  = {};
  filtrados.forEach(p => { porC[p.concepto] = (porC[p.concepto] || 0) + p.monto; });
  let html = `
    <div class="s-chip"><strong>${filtrados.length}</strong><span>Registros</span></div>
    <div class="s-chip"><strong>$${formatMoney(total)}</strong><span>Total</span></div>`;
  Object.entries(porC).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([k,v]) => {
    html += `<div class="s-chip"><strong>$${formatMoney(v)}</strong><span>${k}</span></div>`;
  });
  chips.innerHTML = html;
}

/* ── Excel general ───────────────────────────────────── */
function exportarExcel() {
  if (!filtrados.length) { showToast('Sin datos para exportar','warning'); return; }
  const headers = ['# Factura','Fecha','Apartamento','Propietario','Concepto','Monto'];
  const rows    = filtrados.map(p => [p.factura, p.fecha, p.apto, p.owner_name, p.concepto, p.monto]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [{wch:12},{wch:12},{wch:12},{wch:28},{wch:22},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Historial');
  XLSX.writeFile(wb, `historial_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast('Archivo descargado','success');
}

/* ══ REPORTE PDF ═══════════════════════════════════════ */
function abrirReporte() {
  document.getElementById('reporte-modal').classList.add('open');
}
function cerrarReporte() {
  document.getElementById('reporte-modal').classList.remove('open');
}
document.getElementById('reporte-modal').addEventListener('click', function(e) {
  if (e.target === this) cerrarReporte();
});

function getPagosFiltradosReporte() {
  const apto     = document.getElementById('rep-apto').value;
  const desde    = document.getElementById('rep-desde').value;
  const hasta    = document.getElementById('rep-hasta').value;
  const concepto = document.getElementById('rep-concepto').value;
  if (!apto) return null;
  let p = allPagos.filter(x => x.apto === apto);
  if (desde)    p = p.filter(x => x.fecha >= desde);
  if (hasta)    p = p.filter(x => x.fecha <= hasta);
  if (concepto) p = p.filter(x => x.concepto === concepto);
  return { apto, desde, hasta, concepto, pagos: p };
}

function fdate(s) {
  if (!s) return '—';
  try {
    const [y,m,d] = s.split('T')[0].split('-');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  } catch { return s; }
}

          <div class="ic-lbl">PROPIETARIO</div>

      </div>

      <div class="summary-cards">
        <div class="sum-card"><div class="sv">${pagos.length}</div><div class="sl">Registros</div></div>
        <div class="sum-card"><div class="sv">$${formatMoney(total)}</div><div class="sl">Total</div></div>
      </div>

      <table class="doc-table">
        <thead>
          <tr>
            <th># Factura</th>
            <th>Fecha</th>

            <th class="right">Monto</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows}

      <div class="total-line" style="border-top: 2px solid var(--doc-accent); padding-top: 10px; display: flex; justify-content: flex-end; gap: 20px; margin-top: 20px;">
        <span style="font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--doc-muted);">TOTAL</span>
        <span style="font-size:1.1rem; font-weight:900; color:var(--doc-accent);">$${formatMoney(total)}</span>
      </div>

      <div class="signature-section">
        <div class="signature-block">

  `;
}

/* FINAL DE LA FUNCION generarReporte() */

/* ── Imprimir / Exportar PDF ─────────────────────────── */
function imprimirPDF() {
  const apto = document.getElementById('rep-apto').value;
  if (!apto) { showToast('Selecciona un apartamento primero','warning'); return; }
  const doc = document.getElementById('pdf-doc');
  if (!doc)  { showToast('Genera el reporte primero','warning'); return; }
  window.print();
}

/* ── Excel del reporte ───────────────────────────────── */
function exportarReporteExcel() {
  const res = getPagosFiltradosReporte();
  if (!res) { showToast('Selecciona un apartamento primero','warning'); return; }
  const { apto, pagos } = res;
  if (!pagos.length) { showToast('Sin datos para exportar','warning'); return; }

  const total   = pagos.reduce((s,p) => s+p.monto, 0);
  const headers = ['# Factura','Fecha','Apartamento','Propietario','Concepto','Monto'];
  const rows    = pagos.map(p => [p.factura, p.fecha, p.apto, p.owner_name, p.concepto, p.monto]);
  rows.push([], ['','','','','TOTAL', total]);

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [{wch:12},{wch:12},{wch:12},{wch:28},{wch:22},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `Apt ${apto}`);
  XLSX.writeFile(wb, `reporte_apt${apto}_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast('Reporte descargado','success');
}

init();
