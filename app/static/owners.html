<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propietarios | Alianza Residencial</title>
  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="main-header" id="main-header"></header>

<div class="app">
  <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;">
    <div>
      <h1><i class="fas fa-users" style="color:var(--accent);margin-right:8px;"></i>Propietarios</h1>
      <p>Registro e historial de propietarios del sistema</p>
    </div>
    <button class="btn-primary" style="width:auto;" onclick="openCreateDrawer()">
      <i class="fas fa-plus"></i> Nuevo Propietario
    </button>
  </div>

  <div class="card" style="margin-bottom:0;">
    <div class="card-header">
      <h3><i class="fas fa-list"></i> Propietarios Registrados</h3>
      <span class="badge badge-primary" id="owner-count">0</span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Identificación</th>
            <th>Contacto</th>
            <th>Unidad Activa</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="owners-table">
          <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══ Drawer: nuevo/editar propietario ═══ -->
<div class="drawer-overlay" id="owner-drawer-overlay" onclick="closeOwnerDrawer()"></div>
<aside class="drawer" id="owner-drawer">
  <div class="drawer-header">
    <div>
      <h3><i class="fas fa-user-plus" style="color:var(--accent);margin-right:6px;"></i><span id="form-title">Nuevo Propietario</span></h3>
    </div>
    <button class="drawer-close" onclick="closeOwnerDrawer()"><i class="fas fa-times"></i></button>
  </div>

  <div class="drawer-body">
    <input type="hidden" id="owner-id">

    <label class="field-label">Nombre completo *</label>
    <input type="text" id="full_name" placeholder="Ej: Juan Pérez">

    <label class="field-label">Identificación</label>
    <input type="text" id="identification" placeholder="Cédula o pasaporte">

    <label class="field-label">Correo electrónico</label>
    <input type="email" id="email" placeholder="correo@email.com">

    <label class="field-label">Teléfono</label>
    <input type="tel" id="phone" placeholder="+507 6000-0000">
  </div>

  <div class="drawer-actions">
    <button class="btn-primary" onclick="saveOwner()"><i class="fas fa-save"></i> <span id="btn-label">Guardar Propietario</span></button>
    <button class="btn-ghost" onclick="closeOwnerDrawer()">Cancelar</button>
  </div>
</aside>

<!-- ═══ Modal: confirmar eliminación ═══ -->
<div class="modal-overlay" id="confirm-delete-overlay">
  <div class="modal-box" style="width:380px;">
    <h3><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i> Eliminar propietario</h3>
    <p id="confirm-delete-text">¿Seguro que deseas eliminar este propietario? Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeConfirmDelete()">Cancelar</button>
      <button class="btn-danger" onclick="executeDeleteOwner()"><i class="fas fa-trash-alt"></i> Eliminar</button>
    </div>
  </div>
</div>

<div id="notification"></div>
<script src="js/main.js"></script>
<script>
renderHeader('owners');

let editingId = null;
let allOwnersCache = [];

async function loadTable() {
  const [owners, unitOwners, units] = await Promise.all([
    apiRequest('/owners'),
    apiRequest('/unit-owners/all').catch(() => null),
    apiRequest('/units'),
  ]);

  allOwnersCache = owners || [];
  document.getElementById('owner-count').textContent = allOwnersCache.length;

  const tbody = document.getElementById('owners-table');

  if (!allOwnersCache.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">Sin propietarios registrados</td></tr>`;
    return;
  }

  // Build unit per owner from unit-owners
  const unitMap = {};
  if (unitOwners && Array.isArray(unitOwners)) {
    unitOwners.filter(uo => uo.is_active).forEach(uo => {
      const u = (units || []).find(x => x.id === uo.unit_id);
      if (u) unitMap[uo.owner_id] = `Apt. ${u.unit_number}`;
    });
  }

  tbody.innerHTML = allOwnersCache.map(o => `
    <tr>
      <td class="td-mono">${o.id}</td>
      <td><strong>${o.full_name}</strong></td>
      <td style="color:var(--text-secondary);font-size:.82rem;">${o.identification || '—'}</td>
      <td style="font-size:.82rem;">
        ${o.email ? `<div><i class="fas fa-envelope" style="opacity:.5;margin-right:4px;"></i>${o.email}</div>` : ''}
        ${o.phone ? `<div><i class="fas fa-phone" style="opacity:.5;margin-right:4px;"></i>${o.phone}</div>` : ''}
        ${!o.email && !o.phone ? '—' : ''}
      </td>
      <td>
        ${unitMap[o.id]
          ? `<span class="badge badge-teal">${unitMap[o.id]}</span>`
          : `<em style="color:var(--text-muted);font-size:.82rem;">Sin unidad</em>`}
      </td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="editOwner(${o.id})">
          <i class="fas fa-pencil-alt"></i>
        </button>
        <button class="btn btn-ghost btn-sm" onclick="deleteOwner(${o.id}, '${o.full_name.replace(/'/g, "\\'")}')" style="color:var(--danger);">
          <i class="fas fa-trash-alt"></i>
        </button>
      </td>
    </tr>`).join('');
}

/* ─── Drawer: crear/editar ────────────────────────────────── */
function openCreateDrawer() {
  cancelEdit();
  document.getElementById('owner-drawer').classList.add('open');
  document.getElementById('owner-drawer-overlay').classList.add('open');
}
function closeOwnerDrawer() {
  document.getElementById('owner-drawer').classList.remove('open');
  document.getElementById('owner-drawer-overlay').classList.remove('open');
}

async function saveOwner() {
  const name = document.getElementById('full_name').value.trim();
  if (!name) { showToast('El nombre es obligatorio', 'error'); return; }

  const data = {
    full_name:      name,
    identification: document.getElementById('identification').value.trim() || null,
    email:          document.getElementById('email').value.trim() || null,
    phone:          document.getElementById('phone').value.trim() || null,
  };

  let result;
  if (editingId) {
    result = await apiRequest(`/owners/${editingId}`, 'PUT', data);
    if (result) showToast('Propietario actualizado');
  } else {
    result = await apiRequest('/owners/', 'POST', data);
    if (result) showToast('Propietario creado correctamente');
  }

  if (result) { cancelEdit(); closeOwnerDrawer(); loadTable(); }
}

function editOwner(id) {
  const o = allOwnersCache.find(x => x.id === id);
  if (!o) return;

  editingId = id;
  document.getElementById('owner-id').value        = id;
  document.getElementById('full_name').value        = o.full_name;
  document.getElementById('identification').value   = o.identification || '';
  document.getElementById('email').value            = o.email || '';
  document.getElementById('phone').value            = o.phone || '';
  document.getElementById('form-title').textContent = 'Editar Propietario';
  document.getElementById('btn-label').textContent  = 'Actualizar';
  document.getElementById('owner-drawer').classList.add('open');
  document.getElementById('owner-drawer-overlay').classList.add('open');
}

function cancelEdit() {
  editingId = null;
  ['owner-id','full_name','identification','email','phone'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('form-title').textContent = 'Nuevo Propietario';
  document.getElementById('btn-label').textContent  = 'Guardar Propietario';
}

let ownerIdToDelete = null;

function deleteOwner(id, name) {
  ownerIdToDelete = id;
  document.getElementById('confirm-delete-text').textContent =
    `¿Seguro que deseas eliminar a "${name}"? Esta acción no se puede deshacer.`;
  document.getElementById('confirm-delete-overlay').classList.add('open');
}

function closeConfirmDelete() {
  document.getElementById('confirm-delete-overlay').classList.remove('open');
  ownerIdToDelete = null;
}

async function executeDeleteOwner() {
  if (!ownerIdToDelete) return;
  const result = await apiRequest(`/owners/${ownerIdToDelete}`, 'DELETE');
  if (result) {
    showToast('Propietario eliminado correctamente');
    closeConfirmDelete();
    loadTable();
  }
  // Si el backend responde 400/500 (ej. tiene pagos registrados), apiRequest ya muestra el detail exacto vía showToast.
}

loadTable();
</script>
</body>
</html>
