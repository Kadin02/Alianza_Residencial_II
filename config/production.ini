[app]
name = Alianza Residencial
version = 1.0.0
environment = production

[database]
url = sqlite:///./database/alianza.db
pool_size = 5
max_overflow = 10

[security]
secret_key = ${SECRET_KEY}
algorithm = HS256
token_expire_minutes = 480  # 8 horas

[paths]
static = ./frontend/static
templates = ./backend/app/templates
invoices = ./invoices
logs = ./logs

[server]
host = 0.0.0.0
port = 8000
workers = 4
reload = false